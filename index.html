<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KaotiKlash</title>
    <link
      rel="preload"
      href="././fonts/MedievalSharp.ttf"
      as="font"
      type="font/ttf"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="start-game-screen">
      <button type="button" id="start-game-btn">Start Game</button>

      <button type="button" id="skip-phase-btn">Skip phase</button>

      <button type="button" id="attack-phase-btn">Attack phase</button>

      <button type="button" id="move-phase-btn">Move phase</button>

      <button type="button" id="prepare-event-phase-btn">Preparation phase</button>

      <button type="button" id="perform-event-phase-btn">Perform phase</button>
    </div>

    <canvas id="game-screen" width="1920" height="1080">

      <div id="skip-btn">
        <button type="button" id="exit">exit</button>
      </div>


    </canvas>

    <script type="module" src="./src/index.js"></script>
  </body>
</html>
